spring:
  datasource:
    url: jdbc:h2:mem:blog;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: change-this-secret-change-this-secret
  expire-seconds: 86400

admin:
  seed:
    username: admin
    password: admin123456
    nickname: 管理员

storage:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: blog-assets
  public-base-url: http://localhost:9000/blog-assets
