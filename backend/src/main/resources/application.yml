server:
  port: 8080

spring:
  application:
    name: multi-user-blog
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/blog}
    username: ${SPRING_DATASOURCE_USERNAME:blog}
    password: ${SPRING_DATASOURCE_PASSWORD:blog123}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:change-this-secret-change-this-secret}
  expire-seconds: ${JWT_EXPIRE_SECONDS:86400}

admin:
  seed:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123456}
    nickname: ${ADMIN_NICKNAME:管理员}

storage:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:blog-assets}
  public-base-url: ${MINIO_PUBLIC_BASE_URL:${MINIO_ENDPOINT:http://localhost:9000}/${MINIO_BUCKET:blog-assets}}
